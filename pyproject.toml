[project]
name = "solrunners"
version = "0.1.0"
# Python 3.11 is the proven baseline on all RPi nodes and works on macOS too.
# pyglet 1.5.27 is the only confirmed-working version with the current AV-sync
# code in Entro.py and Heads.py.  Do NOT bump pyglet without full on-device testing.
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "pyglet==1.5.27",
    "opencv-contrib-python",   # contrib variant required for face-detection classifiers (Heads.py)
    "ruamel.yaml",
    "scipy",
    # Ansible runs from the project venv so deployment.sh doesn't need a system-level install.
    # ansible-core is the lean core package; full `ansible` meta-package pulls all collections.
    "ansible-core",
]
