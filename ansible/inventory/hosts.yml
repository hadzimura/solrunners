# inventory/hosts.yml — Raspberry Pi node definitions for Springs of Life
#
# ansible_host: use hostname.local (mDNS) once avahi is bootstrapped on the node.
#               access_point/monitor.py rewrites this automatically after bootstrap.
#               Until then, keep the exhibition-LAN static IP as fallback.
#
# wifi_mac: used by access_point/monitor.py to identify nodes by ARP MAC during
#           bootstrap (before avahi / mDNS is available).  Not used by Ansible.
#
# All nodes use user: zero  /  password: (prompted at deploy time)

all:
  children:

    # ── Fountain ────────────────────────────────────────────────────────────
    # RPi 3, 2 GB RAM — audio-only object, no display
    fountain:
      hosts:
        fountain-node:
          ansible_host: 192.168.0.191
          wifi_mac: "e8:48:b8:c9:78:9e"

    # ── Tate ────────────────────────────────────────────────────────────────
    tate:
      hosts:
        tate-node:
          ansible_host: 192.168.0.192
          wifi_mac: ""                          # MAC not yet recorded

    # ── Entropy ─────────────────────────────────────────────────────────────
    # RPi 5 (rpi6), 29 GB SD card — horizontal 16:9 video + audio
    # No NVMe; media lives on SD via /storage symlink
    entropy:
      hosts:
        entropy-node:
          ansible_host: 192.168.0.196
          wifi_mac: "2c:cf:67:5b:7e:d2"

    # ── Entropy DAC ─────────────────────────────────────────────────────────
    # RPi 5, 8 GB RAM, 29 GB SD card — same runtime as entropy but with
    # RPi DAC+ shield (pcm512x I2S) for dedicated analog audio output.
    entropy_dac:
      hosts:
        entropy-dac-node:
          ansible_host: 192.168.0.197
          wifi_mac: ""                          # MAC not yet recorded

    # ── Heads ───────────────────────────────────────────────────────────────
    # RPi 5, 8 GB RAM, 117 GB NVMe SSD — vertical 10:16 video + audio via HDMI
    # eth0 MAC: 2c:cf:67:ab:95:29
    heads:
      hosts:
        heads-node:
          ansible_host: 192.168.0.190
          wifi_mac: "2c:cf:67:ab:95:2a"

    # ── Convenience "all runners" group ─────────────────────────────────────
    runners:
      children:
        fountain: {}
        tate: {}
        entropy: {}
        entropy_dac: {}
        heads: {}
