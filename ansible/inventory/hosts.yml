# inventory/hosts.yml — Raspberry Pi node definitions for Springs of Life
#
# Nodes are grouped by their artistic role.  Add IP addresses here as each
# physical device is configured and connected to the local network.
#
# Known network: exhibition LAN (typically 192.168.0.x during development)
# All nodes use user: zero  /  password: (prompted at deploy time)

all:
  children:

    # ── Fountain ────────────────────────────────────────────────────────────
    # RPi 3, 2 GB RAM — audio-only object, no display
    # Network details: TBD (node not yet available)
    fountain:
      hosts:
        fountain-node:
          ansible_host: TBD           # update when node is connected
          # wifi MAC: TBD

    # Network details: TBD (node not yet available)
    tate:
      hosts:
        tate-node:
          ansible_host: 192.168.0.192           # update when node is connected
          # wifi MAC: TBD

    # ── Entropy ─────────────────────────────────────────────────────────────
    # RPi 5, 8 GB RAM, 128 GB M.2 SSD — horizontal 16:9 video + audio
    # Network: 192.168.0.190  |  WiFi MAC: 2C:CF:67:AB:95:2A
    entropy:
      hosts:
        entropy-node:
          ansible_host: 192.168.0.190

    # ── Heads ───────────────────────────────────────────────────────────────
    # RPi 5, 8 GB RAM, 16 GB SD card — vertical 10:16 video + audio
    # Network details: TBD (node not yet available)
    heads:
      hosts:
        heads-node:
          ansible_host: TBD           # update when node is connected
          # wifi MAC: TBD

    # ── Convenience "all runners" group ─────────────────────────────────────
    runners:
      children:
        fountain: {}
        tate: {}
        entropy: {}
        heads: {}
