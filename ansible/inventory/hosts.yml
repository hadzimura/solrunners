# inventory/hosts.yml — Raspberry Pi node definitions for Springs of Life
#
# Nodes are grouped by their artistic role.  Add IP addresses here as each
# physical device is configured and connected to the local network.
#
# Known network: exhibition LAN (typically 192.168.0.x during development)
# All nodes use user: zero  /  password: (prompted at deploy time)

all:
  children:

    # ── Fountain ────────────────────────────────────────────────────────────
    # RPi 3, 2 GB RAM — audio-only object, no display
    # Network details: TBD (node not yet available)
    fountain:
      hosts:
        fountain-node:
          ansible_host: 192.168.0.191
          # wifi MAC: e8:48:b8:c9:78:9e  (bind to permanent IP at router)

    # Network details: TBD (node not yet available)
    tate:
      hosts:
        tate-node:
          ansible_host: 192.168.0.192           # update when node is connected
          # wifi MAC: TBD

    # ── Entropy ─────────────────────────────────────────────────────────────
    # RPi 5 (rpi6), 29 GB SD card — horizontal 16:9 video + audio
    # Network: 192.168.0.196  |  no NVMe; media lives on SD via /storage symlink
    entropy:
      hosts:
        entropy-node:
          ansible_host: 192.168.0.196
          # wifi MAC: 2c:cf:67:5b:7e:d2

    # ── Entropy DAC ─────────────────────────────────────────────────────────
    # RPi 5, 8 GB RAM, 29 GB SD card — same runtime as entropy but with
    # RPi DAC+ shield (pcm512x I2S) for dedicated analog audio output.
    # Network: 192.168.0.197
    entropy_dac:
      hosts:
        entropy-dac-node:
          ansible_host: 192.168.0.197

    # ── Heads ───────────────────────────────────────────────────────────────
    # RPi 5, 8 GB RAM, 117 GB NVMe SSD — vertical 10:16 video + audio via HDMI
    # Network: 192.168.0.190
    heads:
      hosts:
        heads-node:
          ansible_host: 192.168.0.190
          # eth0 MAC: 2c:cf:67:ab:95:29  (bind to permanent IP at router)
          # wifi MAC: 2c:cf:67:ab:95:2a

    # ── Convenience "all runners" group ─────────────────────────────────────
    runners:
      children:
        fountain: {}
        tate: {}
        entropy: {}
        entropy_dac: {}
        heads: {}
