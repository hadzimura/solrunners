---
# playbooks/setup-entropy.yml
# Full setup for the Entropy node (RPi 5, 8 GB RAM, 128 GB M.2 SSD).
# Run this after a fresh Raspberry Pi OS Lite installation.
#
# Usage (via deployment.sh or directly):
#   ansible-playbook playbooks/setup-entropy.yml --ask-pass --ask-become-pass

- name: "Springs of Life — Entropy node setup"
  hosts: entropy
  gather_facts: true

  roles:
    - role: common     # base OS: packages, git clone, venv, tmpfs
    - role: display    # minimal X11 stack (xserver-xorg-core, xinit, libgtk-3)
    - role: entropy    # systemd service deployment
