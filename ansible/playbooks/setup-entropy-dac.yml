---
# playbooks/setup-entropy-dac.yml
# Full setup for the Entropy DAC node (RPi 5, RPi DAC+ shield, 29 GB SD card).
# Run this after a fresh Raspberry Pi OS Lite installation.
#
# The Entropy DAC node runs the same runtime as the Entropy node (OpenCV video
# + pyglet audio) but routes audio through the RPi DAC+ (pcm512x I2S) shield
# instead of HDMI.  The entropy role detects sol_audio_dac: true (set in
# group_vars/entropy_dac.yml) and adds ALSA + WirePlumber DAC routing tasks.
#
# Usage (via deployment.sh or directly):
#   ansible-playbook playbooks/setup-entropy-dac.yml --ask-pass --ask-become-pass

- name: "Springs of Life — Entropy DAC node setup"
  hosts: entropy_dac
  gather_facts: true

  pre_tasks:
    # ── Wipe home folder (preserve user account) ─────────────────────────────
    # Remove all previous deployments/leftovers from /home/zero before fresh setup.
    # The user account and its ownership are preserved; only contents are removed.
    - name: Remove previous home folder contents
      ansible.builtin.shell: |
        find /home/{{ sol_user }} -mindepth 1 -maxdepth 1 -exec rm -rf {} +
      become: true
      changed_when: true

  roles:
    - role: common     # base OS: packages, git clone, venv, /storage symlink
    - role: display    # minimal X11 stack (xserver-xorg-core, xinit, libgtk-3)
    - role: entropy    # PipeWire, DAC routing, systemd service deployment
