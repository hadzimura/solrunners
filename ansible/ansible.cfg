# ansible.cfg — Ansible configuration for Springs of Life deployment
# Control node: developer's Mac  →  targets: Raspberry Pi nodes (Raspbian Lite)

[defaults]
# Path to inventory relative to this file
inventory            = inventory/hosts.yml

# Roles path relative to this file
roles_path           = roles

# Remote user on all RPis
remote_user          = zero

# Do not check SSH host keys on first connect (nodes may be freshly imaged)
host_key_checking    = False

# Show task timing; helpful to see how long media rsync takes
callbacks_enabled    = timer

# Single retry file per playbook in /tmp (prevents repo clutter)
retry_files_enabled  = False

# Suppress deprecation warnings for now
deprecation_warnings = False

# Python interpreter path on RPi (Raspbian Lite 64-bit uses python3)
interpreter_python   = /usr/bin/python3

[ssh_connection]
# Pipelining reduces the number of SSH connections per task
pipelining           = True

# SSH args: ControlMaster keeps the connection alive between tasks
ssh_args             = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
